# ArthaOS nginx config — Oracle Cloud Ubuntu
# Place at: /etc/nginx/sites-available/arthaos
# Enable: sudo ln -s /etc/nginx/sites-available/arthaos /etc/nginx/sites-enabled/
# Reload: sudo nginx -t && sudo systemctl reload nginx
#
# Replace YOUR_SERVER_IP with your Oracle Cloud public IP
# (or your domain if you set up DNS)

server {
    listen 80;
    server_name YOUR_SERVER_IP;

    # Dashboard (Next.js frontend)
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Backend API
    location /api/ {
        rewrite ^/api/(.*) /$1 break;
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # WebSocket — real-time alerts
    location /ws/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }
}
